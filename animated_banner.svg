<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="200">
  
  <style>
    @keyframes pulse {
      0% { filter: drop-shadow(0 0 5px #0fb7d4) drop-shadow(0 0 10px #0fb7d4); }
      50% { filter: drop-shadow(0 0 15px #0fb7d4) drop-shadow(0 0 30px #0fb7d4); }
      100% { filter: drop-shadow(0 0 5px #0fb7d4) drop-shadow(0 0 10px #0fb7d4); }
    }
    .glowing-text {
      animation: pulse 2s infinite;
    }
  </style>

  <defs>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur"/>
    </filter>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"/>
      <stop offset="100%"/>
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)" rx="15" ry="15"/>
  
  <rect x="0" y="195" width="1000" height="5" fill="#0fb7d4"/>

  <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="90" fill="#0fb7d4" class="glowing-text" letter-spacing="4">
    KAYZE
  </text>
  
  
  
  <rect x="50" y="90" width="10" height="20" fill="#2a2a2a"/>
  <rect x="70" y="90" width="10" height="20" fill="#2a2a2a"/>
  <rect x="920" y="90" width="10" height="20" fill="#2a2a2a"/>
  <rect x="940" y="90" width="10" height="20" fill="#2a2a2a"/>
</svg>